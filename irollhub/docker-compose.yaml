version: "3.8"

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  irollhub:
    build:
      context: ./irollhub
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      IROLLHUB_LISTEN: ":8080"
      IROLLHUB_DB: "/app/data/hub.db"
      IROLLHUB_MINIO_ENDPOINT: "minio:9000"
      IROLLHUB_MINIO_ACCESS_KEY: minioadmin
      IROLLHUB_MINIO_SECRET_KEY: minioadmin
      IROLLHUB_MINIO_BUCKET: irollhub
      IROLLHUB_MINIO_USE_SSL: "false"
    volumes:
      - irollhub-data:/app/data
    depends_on:
      minio:
        condition: service_healthy

volumes:
  minio-data:
  irollhub-data:
